<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Iniciar sesión | KPI Aramark</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="login-wrapper">
  <div class="login-card">
    <div class="text-center mb-4">
      <img src="{{ url_for('static', filename='css/img/Aramark.png') }}" class="login-logo" alt="Aramark">
      <div class="login-title mt-2"><i class="bi bi-clipboard2-data"></i> KPI Evaluaciones</div>
      <div class="text-muted" style="font-size:.82rem;">Sistema de evaluación de desempeño</div>
    </div>

    {% with msgs = get_flashed_messages(with_categories=true) %}
      {% if msgs %}{% for cat, msg in msgs %}
        <div class="alert alert-{{ cat }} py-2 mb-3">{{ msg }}</div>
      {% endfor %}{% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}">
      <div class="mb-3">
        <label class="form-label fw-600" style="font-weight:600;color:#444;">Evaluador</label>
        <select name="evaluator_id" class="form-select" required>
          <option value="">— Seleccionar —</option>
          {% for e in evaluators %}
            <option value="{{ e.id }}">{{ e.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="mb-4">
        <label class="form-label fw-600" style="font-weight:600;color:#444;">Contraseña</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn w-100 text-white" style="background:var(--app-red);font-weight:700;padding:.7rem;">
        <i class="bi bi-box-arrow-in-right me-1"></i> Ingresar
      </button>
    </form>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
