{% extends 'base.html' %}
{% block title %}Administración{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="kpi-card">
      <div class="kpi-card-header"><i class="bi bi-shield-lock me-1"></i> Acceso administrativo</div>
      <div class="kpi-card-body">
        <p class="text-muted mb-3" style="font-size:.88rem;">
          Ingresa la clave administrativa para gestionar colaboradores, evaluadores y KPIs.
        </p>
        {% if error %}
          <div class="alert alert-danger py-2">{{ error }}</div>
        {% endif %}
        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-semibold">Clave administrativa</label>
            <input type="password" name="admin_key" class="form-control" placeholder="••••••••" required autofocus>
          </div>
          <button type="submit" class="btn w-100 text-white" style="background:var(--app-red);font-weight:600;">
            <i class="bi bi-unlock me-1"></i> Ingresar al panel
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
